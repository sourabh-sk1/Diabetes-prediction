<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Diabetes Risk Predictor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1e40af',
                        secondary: '#3b82f6',
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .medical-gradient {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }
        .input-field {
            transition: all 0.3s ease;
        }
        .input-field:focus {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.2);
        }
        .predict-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: all 0.3s ease;
        }
        .predict-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(102, 126, 234, 0.4);
        }
        .result-animation {
            animation: slideInUp 0.6s ease-out;
        }
        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .history-item {
            transition: all 0.3s ease;
        }
        .history-item:hover {
            transform: translateX(5px);
        }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-purple-50 via-blue-50 to-indigo-100">
    <div class="max-w-4xl mx-auto">
        <!-- Header -->
        <div class="text-center mb-12 pt-8">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-white rounded-full shadow-lg mb-6">
                <i class="fas fa-heartbeat text-3xl text-purple-600"></i>
            </div>
            <h1 class="text-5xl font-bold bg-gradient-to-r from-purple-600 to-blue-600 bg-clip-text text-transparent mb-4">
                AI Diabetes Risk Predictor
            </h1>
            <p class="text-xl text-gray-600 max-w-2xl mx-auto">
                Advanced machine learning analysis for accurate diabetes risk assessment
            </p>
        </div>

        <div class="grid md:grid-cols-2 gap-12 items-start">
            <!-- Input Form Card -->
            <div class="glass-card rounded-3xl p-8">
                <div class="flex items-center justify-between mb-8">
                    <h2 class="text-2xl font-bold text-gray-800">Patient Information</h2>
                    <button onclick="toggleHistory()" class="text-purple-600 hover:text-purple-800 transition-colors">
                        <i class="fas fa-history text-xl"></i>
                    </button>
                </div>
                <form id="predictForm" class="space-y-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Pregnancies</label>
                        <input type="number" name="pregnancies" min="0" step="1" required
                               class="input-field w-full p-4 border border-gray-200 rounded-xl focus:ring-2 focus:ring-purple-500 focus:border-transparent">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Glucose (mg/dL)</label>
                        <input type="number" name="glucose" min="0" step="0.1" required
                               class="input-field w-full p-4 border border-gray-200 rounded-xl focus:ring-2 focus:ring-purple-500 focus:border-transparent">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Blood Pressure (mm Hg)</label>
                        <input type="number" name="blood_pressure" min="0" step="0.1" required
                               class="input-field w-full p-4 border border-gray-200 rounded-xl focus:ring-2 focus:ring-purple-500 focus:border-transparent">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Skin Thickness (mm)</label>
                        <input type="number" name="skin_thickness" min="0" step="0.1" required
                               class="input-field w-full p-4 border border-gray-200 rounded-xl focus:ring-2 focus:ring-purple-500 focus:border-transparent">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Insulin (mu U/ml)</label>
                        <input type="number" name="insulin" min="0" step="0.1" required
                               class="input-field w-full p-4 border border-gray-200 rounded-xl focus:ring-2 focus:ring-purple-500 focus:border-transparent">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">BMI (weight kg/m²)</label>
                        <input type="number" name="bmi" min="0" step="0.1" required
                               class="input-field w-full p-4 border border-gray-200 rounded-xl focus:ring-2 focus:ring-purple-500 focus:border-transparent">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Diabetes Pedigree Function</label>
                        <input type="number" name="pedigree" min="0" step="0.001" required
                               class="input-field w-full p-4 border border-gray-200 rounded-xl focus:ring-2 focus:ring-purple-500 focus:border-transparent">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Age (years)</label>
                        <input type="number" name="age" min="0" step="1" required
                               class="input-field w-full p-4 border border-gray-200 rounded-xl focus:ring-2 focus:ring-purple-500 focus:border-transparent">
                    </div>
                    
                    <div class="flex gap-4 pt-4">
                        <button type="submit" id="predictBtn" 
                                class="predict-btn flex-1 text-white font-bold py-4 px-6 rounded-2xl">
                            <i class="fas fa-microscope mr-2"></i>
                            Analyze Risk
                        </button>
                        <button type="button" onclick="resetForm()" 
                                class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold py-4 px-6 rounded-2xl transition-all">
                            <i class="fas fa-redo mr-2"></i>
                            Reset
                        </button>
                    </div>
                </form>
            </div>

            <!-- Result Card -->
            <div id="resultCard" class="glass-card rounded-3xl p-8 hidden">
                <h2 class="text-2xl font-bold text-gray-800 mb-8 text-center">
                    <i class="fas fa-chart-line mr-2 text-purple-600"></i>
                    Analysis Results
                </h2>
                <div id="resultContent" class="text-center space-y-6">
                    <!-- Results will be populated by JavaScript -->
                </div>
                
                <!-- Risk Visualization -->
                <div class="mt-12">
                    <label class="block text-lg font-semibold text-gray-700 mb-4 text-center">
                        <i class="fas fa-tachometer-alt mr-2"></i>
                        Risk Probability
                    </label>
                    <div class="bg-gray-200 rounded-full h-8 relative overflow-hidden">
                        <div id="riskBar" class="h-full rounded-full transition-all duration-1000" style="width: 0%"></div>
                    </div>
                    <div id="probValue" class="text-4xl font-bold text-center mt-6 font-mono">0%</div>
                </div>
                
                <!-- Recommendations -->
                <div id="recommendations" class="mt-8 p-6 bg-blue-50 rounded-2xl border border-blue-200">
                    <h3 class="text-lg font-semibold text-blue-800 mb-3">
                        <i class="fas fa-lightbulb mr-2"></i>
                        Health Recommendations
                    </h3>
                    <div id="recommendationList" class="space-y-2 text-blue-700">
                        <!-- Recommendations will be populated by JavaScript -->
                    </div>
                </div>
            </div>
        </div>
        
        <!-- History Panel -->
        <div id="historyPanel" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden">
            <div class="absolute right-0 top-0 h-full w-full max-w-md bg-white shadow-2xl">
                <div class="p-6 border-b border-gray-200">
                    <div class="flex items-center justify-between">
                        <h3 class="text-xl font-bold text-gray-800">
                            <i class="fas fa-history mr-2"></i>
                            Prediction History
                        </h3>
                        <button onclick="toggleHistory()" class="text-gray-500 hover:text-gray-700">
                            <i class="fas fa-times text-xl"></i>
                        </button>
                    </div>
                </div>
                <div id="historyList" class="p-6 overflow-y-auto h-full pb-32">
                    <!-- History items will be populated here -->
                </div>
            </div>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
